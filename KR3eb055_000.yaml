body:
  text: 舌診提要五首萬舉萬全色脈同軒岐垂教振癡聾心家外候陽明主津液無傷舌正紅燥潤分來病可求紅黃黑白辨根由藍苔舌面光如鏡肝腎先摧命必休金加火上舌如霜鬱熱如焚勢莫當勿謂陰寒皆色白須知物極變非常色變非常陰症多勿因紅點計乖訛黑枯凝結如鱗甲此亦虛寒會也麼君火光明相不乘黑苔水盛土由崩急投溫熱扶心主從治功多趁可能中華民國三十六年兒童節舍豫老人偶題以代序上篇問察舌以何為主答經云能合色脈萬舉萬全舌亦色之一也夫病以證為主凡仲景言舌者五舉一白胎而分燥滑即以其舌參觀其證必有證而後有方方以治證非徒以治舌也乃後世大抵不以證言徒以舌言一若方即以先舌為準不必更論其舌之因何證而見紛壇其説徒亂人意實無關於治法故察舌必以證為主也問舌為何臟之外候答難經曰心氣通於舌是舌為心之外候也問有謂舌為胃府之外候者亦有説乎答因胃中飲食腐化濁氣上蒸成為苔色胃無腐濁則苔薄而少胃有腐濁則苔厚而多無苔者胃氣弱而不上潮胃氣清明濁氣少而易降者雖似無苔必微有薄苔舌苔厚膩久而不變者胃力匱乏不能接生新苔也常人一日三餐故苔亦一日三變是謂活苔無病之象也問舌苔何以因飲食而起變化答飲食入胃時將腐濁遏郁下降故苔色一退至飲食腐化濁氣又復上蒸苔色又生經云胃為水穀之海五藏六府皆稟其氣故知胃氣之要即可知苔色之重矣問醫家辨舌何以即知病機之進退淺深答胃之濁氣既可外見於苔而腹中之邪氣熏蒸醞釀者亦常以肺胃為出路故病邪之端倪於舌苔之上最親切顯露醫家辨舌即能知病情者賴有此耳問舌面之部位各何所屬答舌尖屬心肺舌中屬脾胃舌根屬腎而舌邊則屬肝膽問舌之自覺因何而時有變易答此因藏府之寒熱虛實而有各殊之味覺也大抵膽熱恆覺苦脾痹恆覺甜胃虛恆覺淡寒勝及脾腎虛恆覺咸宿食恆覺酸肺熱恆覺辣隨時變易有如此者問舌苔因食物而起變化請舉例以證之答如食酸物及橄欖苔即變黑食砂糖苔變深黃原為白苔若食枇杷苔即變黃之類皆是也問察舌即知病情願為舉例以導初機答凡病初起舌即乾者津竭可知病久而舌猶潤者胃氣尚存望之若干捫之若潤其色鮮紅者濕熱蒸濁也紫而暗者瘀血內蓄也望之若潤捫之卻燥其苔白厚者氣濁痰凝也苔白而薄者氣虛傷津也問舌為心之外候其色當赤而有時白如積粉者是否屬寒答白為肺金之色反加心火之上是為侮其所勝此火為金鬱之候也若概以苔白為寒必殺人矣問何種舌苔須忌溫燥答舌尖屬心如滿舌白苔舌尖有紅刺此心火旺盛白尖紅根其色潤者此邪在半表半裡皆忌溫燥又凡舌四邊有苔中心則無或中心有直裂橫裂直槽者皆心胃陰液不足亦忌溫燥問舌有紫泡者何也答舌邊有紫泡溫病為熱毒歸藏之重證在中間者輕問舌之乾溼何氣使然有無定則答舌之乾溼其狀各異有有苔而燥者有無苔而燥者有有苔而潤者有無苔而潤者有看之似潤而摸之則燥者有看之似燥而摸之則潤者問舌上星點數起或陷下者各為何病答舌上星點數起者為心火胃熱在兩旁主肝膽熱在尖主心熱淡而陷下者為虛在小兒為有滯有蟲陷而起瘰舌紅者則為邪毒內伏問舌苔每因病之進退而起變化其狀若何答凡病之進者苔常變病之退者苔漸退如無病為薄白之苔病進則由白而嫩黃而老黃而膩而燥而灰而黑無病為微黃之苔病進則由黃而白而灰而黑其舌常由淡紅微潤變為深紅而干而紫而光而剝如病由重轉輕而漸愈苔必逐漸化退先化而後退如肉厚而漸薄由板而生孔由硬而漸軟由密而漸疏由有而漸無由舌根外達至舌尖是為真退由退而後生薄白或微黃新苔乃胃氣漸復穀氣漸進之吉兆若驟然退去不復生新苔或如剝去斑駁留痕皆病之變化非真退化或滿舌厚苔忽然退去舌底仍留汙質膩澀者是為假退或一退即全光如鏡者皆非真退常為病變之逆象問舌因濕熱而為潤燥原聞其狀答舌潤者為津液未傷燥者為津液已耗濕證舌潤熱證舌燥濕漸化熱舌即由潤而燥大抵舌色紅潤多屬表屬虛屬陰屬寒舌燥有苔多屬裡屬實屬陽屬熱無苔垢者偏熱為多有苔垢者偏濕為多問舌之潤燥因何反常原卒聞之答有誤用燥藥津液被劫逼迫而上舌反潤者熱證傳入血分舌亦反潤者此潤之變也凡脾胃有痰飲水血舌多不露燥象不可誤認為寒問舌上素有裂紋者何也答此必為陰虛之人胃津耗傷之人及血衰之人也問人當病後舌紅紋裂或舌之中心有裂紋者何也答其舌紅紋裂者為胃陰不足為陰虛火炎皆宜養陰補血清火之劑其中心有裂紋者為胃氣中虛忌寒涼問舌之滑澀應如何辨別以占病情答舌之滑澀捫之以手而知之滑者津足於潤為近澀者津乏於燥為近滑者常生膩苔偏於濕澀者常生糙苔偏於熱此其大概也問以舌苔之滑澀厚薄而察病之微甚願為舉例以明之答凡舌苔滑者多濕澀者多熱薄者多邪淺厚者多邪盛糙者刺手甚於澀屬穢濁之熱傷胃汁腎液糙者痰涎現黃色為熱邪結里者腐者苔拭之易去為正氣將欲化邪膩者苔拭之不去為穢濁盤踞中宮光而無苔多津液傷剝而紋裂多陰分竭脹者多屬火縮者多屬寒熱極亦有不伸者可從他診決之問有病無病之舌以何為別答苔色宜微黃或微白薄而且勻舌本宜仁潤內充乾溼得中不滑不燥是為無病若紅光外露苔色稍變非邪之外襲即病將內作矣問藍色舌苔何以其病多屬危篤答以藍為肝木之色無胃氣以涵養而發現於外也問苔現藍色其病亦有可治者否答瘟疫濕溫熱鬱不解若有藍苔可以芳香清泄又癇厥及瘀血在胃或有此舌法宜清泄血分問舌色之濃淡淺深於病情有無關係答紅而淡者血虛也紅而濃者內熱也淡紅色之變兼青者為血分虛寒濃色之變絳者為血熱火紅色舌無苔者是心火之色浮越於外為盛極將衰病後絳舌如鏡發亮而光為腎水虧竭瘟疫之發舌現純紅乃蓄熱於內而病將發也下篇問平人之舌色何以常有微胎答舌為心苗心火也舌紅火之正色也上有微胎火之蘊蓄也問人有病則舌色變而胎垢生者何也答舌者火也得其色則為平人之色平人五火齊明如天日光明陰翳消除何胎之有病則君火內虛胃無穀神舌色變而胎垢生矣問有謂因胸中有食故舌有胎者其説然否答若謂胎因食生則平人一日數餐何無胎若謂平人食而即消病則停滯胎生何初病一二日舌上無胎至三四日穀食不入舌反有胎則有食有胎之説無有是處問舌上白胎而滑者何也答此因三焦火熱之氣為寒所侵也問舌上黏胎而垢者何也答此因身發熱而谷不入中上二焦虛熱相蒸也問舌上胎色淡黃或微黃者何也答中土虛也問胎色灰褐或醬板色者何也答中土寒也問舌上紫色或保紫色者何也答紫色者虛寒也深紫色者大虛大寒也問舌上紫色光亮或淡白光亮者何也答紫色光亮者久病火衰土無生原也淡白光亮者久病陰虛榮血內脫也問舌胎黑色者何也答君火虛衰水色上乘也問傷寒舌色反常乃三焦相火乘於君火之位此時應如何施治答夫相火之乘於君火也非相火之有餘乃君火之不足法當救助君火之不明若進以寒涼以汩沒相火之上乘則君火愈虧相火併竭神志散亂而死矣問平人五味入口皆過而無胎病則五味入口而胎生如小兒服藥舌上藥色凝而不退大人食酸舌胎即黑者何也答平人胃氣有餘三焦和暢君火光明故五味入口而無胎病則胃氣空虛君火衰微若五味入口遇酸鹹甘苦則舌上凝滯而胎生矣問傷寒胎黑世人有火極似水之説此時應如何施治答夫火極似水所謂物極必反也既極而反理應從治而主溫熱問舌色反常有屬實熱者有屬虛寒者究以何者為多答舌色反常而實熱者十有二三此三陽病也舌色反常而虛寒者十有七八此三陰病也問舌色反常有紅點大如芥子者何也其舌色如常亦有如是之紅點者又屬何因答舌色反常有紅點者此虛熱也舌色如常有紅點者乃實熱舌也問舌胎色黑屬犀角芩連石膏或承氣之證者辨別以何為準答舌上胎黑而熱極者其胎高浮於上不傷舌之本體或黑或灰此犀角芩連石膏之證者也至大小承氣之證舌必燥黑而又兼出言壯厲等證者是也問舌上散黑而潤四邊灰紫者是否屬熱其凝黑而枯如鱗甲者是否屬寒答此二證前者為虛寒後者為大虛大寒並宜參朮桂附大忌寒涼問病人胃氣已絶者其舌狀若何答其狀滿舌如蠶板硬而黃或板硬而黑如是之舌百無一生附陳修園辨舌詩舌上無胎表證輕白胎半表半里古章程熱紅寒淡參枯潤陰黑陽黃辨死生全現光瑩陰已脫微籠本色氣之平前人傳有三十六採摘多歧語弗精又望色詩春夏秋冬長夏時青黃赤白黑隨宜左肝右肺形呈頰心額腎顴鼻主脾察位須知生者吉審時若遇克堪悲更於黯澤分新舊隱隱微黃是愈期又聞聲詩言微言厲盛衰根譫語實邪錯語昏虛厄痰鳴兆吉兆聲音變舊恐離魂又僧自性聞聲詩肝怒聲呼心喜笑脾為思念發為歌肺金憂慮形為哭腎主呻吟恐亦多附節録醫宗金鑑望色聞聲心法五行五色青黃赤白黑復生青如環常德變色大要生克順逆青赤同化赤黃合一黃白淡黃黑青深碧白黑淡黑白青淺碧赤白化紅青黃變緑黑赤紫成黑黃黧立五色相兼合化不可勝數而其大要則相生者為同化為順相剋者為兼化為逆如黃白合化黃而兼白淡黃之色如白黑合化黑而兼白淡黑之色皆相生變色為病之順也白黑兼化青而兼白淺碧之色如黃黑兼化黃而兼黑之黧色皆相剋變色為病之逆也天有五氣食人入鼻藏於五藏上華面頤肝青心赤脾藏色黃肺白腎黑五藏之常藏色為主時色為客春青夏赤秋白冬黑長夏四季色黃常則客勝主喜歲氣勝人氣為順主勝客惡色脈相合青弦赤洪黃緩白浮黑沉乃平已見其色不得其脈假如病人已見青色不得弦脈得克則死若得浮脈則主死得生則生得沉脈是為水能生木則主生新病脈奪其色不奪脈奪者脈微小也色奪者色不澤也久病色奪其脈不奪新病易已色脈不奪久病難治色脈俱奪新病正受邪制故脈奪也邪受未久色不奪也久病受邪已久故色奪也久病不進故脈不奪也若新病而色脈俱不奪則正不衰而邪不盛也故曰易已久病色脈俱奪則正已衰而邪方盛也故曰難治色見皮外氣含皮中內光外澤氣色相融內光灼灼若動從紋路中映出外澤如玉不浮光油亮者則為氣色並至有色無氣不病命傾有氣無色雖困不凶經曰色至氣不至者死氣至色不至者生黃赤風熱青白主寒青黑為痛甚則痹攣㿠白脫血微黑水寒痿黃諸虛顴赤勞纏治濁晦暗內久而重色深為沉主病在內浮澤明顯外新而輕其病不甚半澤半明雲散易治搏聚難攻黑庭赤顴出如拇指黑色出如拇指於天庭赤色出如拇指於兩顴病雖小愈亦必卒死唇面黑青五官黑起擦殘汗粉如擦殘汗粉之狀色白皆死閉目陰病開目病陽朦朧熱盛時瞑衄常陽絶戴眼目上直視也陰脫目盲氣脫眶陷睛定神亡五色既審五音當明聲為音本音以聲生聲之餘韻音遂以名聲之餘則謂之音非聲之外復有音也角微宮商並羽五聲五音通乎五藏角屬木通乎肝徵屬火通乎心宮屬土通乎脾商屬金通乎肺羽屬水通乎腎喜心所感欣散之聲怒心所感忿厲之聲哀心所感悲嘶之聲樂心所感舒緩之聲敬心所感正肅之聲愛情所感溫和之聲五聲之變變則病生肝呼而急心笑而雄脾歌以漫肺哭促聲腎呻低微色克則凶如肝病呼急得相剋之白色主凶也好言者熱懶言者寒言壯為實言輕為虛言微難復奪氣可知譫妄無倫神明已矣失音聲重內火外寒內火為外寒所遏郁瘡痛而久勞啞使然若失音不粗重且瘡爛而痛是因勞啞使然也啞風不語小兒抽風不語大人中風不語皆謂之啞風雖治命難不能制木也謳歌失音不治亦痊
